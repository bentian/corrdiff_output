<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorrDiff Experiments</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/render.css">
</head>

<body>
    <div class="container">
        <h1>CorrDiff Experiment Results</h1>

        <div class="form-container">
            <!-- Summary Form -->
            <form id="summary-form" class="form-box">
                <h2>Summarize Experiment Group</h2>
                <div class="form-group">
                    <label for="summary-grp">Select Experiment Group:</label>
                    <select id="summary-grp" class="dropdown"></select>
                </div>
                <button type="submit" class="btn">Summarize</button>
            </form>

            <!-- Comparison Form -->
            <form id="comparison-form" class="form-box">
                <h2>Compare Two Experiments</h2>
                <div class="form-group">
                    <label for="exp1">Experiment 1:</label>
                    <select id="exp1" class="dropdown"></select>
                </div>
                <div class="form-group">
                    <label for="exp2">Experiment 2 (optional):</label>
                    <select id="exp2" class="dropdown">
                        <option value="" selected>-- Select --</option>
                    </select>
                </div>
                <button type="submit" class="btn">Compare</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
